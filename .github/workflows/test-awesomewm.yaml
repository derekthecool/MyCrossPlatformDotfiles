---
name: Test my awesome window manager lua configuration

# Only run workflow if awesomewm files have been changed
on:
  push:
    paths:
      - .config/awesome/**

permissions: read-all

jobs:
  test:
    name: awesome window manager config test on ${{ matrix.container }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        container:
          - archlinux:latest
    container:
      image: ${{ matrix.container }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Install awesomewm and testing tools
        run: |
          case ${{ matrix.container }} in
            archlinux*)
              pacman -Sy --noconfirm wget git base-devel sudo awesome
              # Install Lua testing tools
              pacman -S --noconfirm luarocks
              luarocks install --local busted
              luarocks install --local luacheck
              ;;
          esac

      - name: Test awesomewm lua configuration syntax
        run: |
          awesome --check ./.config/awesome/rc.lua

      - name: Run Lua unit tests
        run: |
          export PATH=$HOME/.local/bin:$PATH
          cd ./.config/awesome
          busted --output=terminal tests/

      - name: Run Lua linting
        run: |
          export PATH=$HOME/.local/bin:$PATH
          luacheck .config/awesome/rc.lua .config/awesome/custom-theme.lua .config/awesome/color-schemes.lua

      - name: Validate theme files
        shell: pwsh
        run: |
          # Test that theme can be loaded
          $themePath = "./.config/awesome/custom-theme.lua"
          $colorSchemePath = "./.config/awesome/color-schemes.lua"

          Write-Host "Validating theme files..."

          # Check theme file exists and is readable
          if (-not (Test-Path $themePath)) {
            Write-Host "::error::Theme file not found: $themePath"
            exit 1
          }

          # Check color scheme file exists
          if (-not (Test-Path $colorSchemePath)) {
            Write-Host "::error::Color scheme file not found: $colorSchemePath"
            exit 1
          }

          # Validate theme has notification variables
          $themeContent = Get-Content $themePath -Raw

          $requiredVars = @(
            "notification_bg",
            "notification_fg",
            "notification_border_color"
          )

          foreach ($var in $requiredVars) {
            if ($themeContent -notmatch "theme\.$var") {
              Write-Host "::error::Theme missing required variable: theme.$var"
              exit 1
            }
            Write-Host "✓ Found theme.$var"
          }

          # Validate hex color format in theme
          $hexColors = [regex]::Matches($themeContent, '#[0-9a-fA-F]{6}')
          Write-Host "Found $($hexColors.Count) hex color definitions"

          if ($hexColors.Count -eq 0) {
            Write-Host "::warning::No hex color codes found in theme"
          }

          Write-Host "Theme validation passed!"